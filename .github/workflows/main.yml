name: Build LV-nordpool-monitor

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Clean
        run: rm -rf .pio/build

      - name: Build firmware (LV-nordpool-monitor)
        run: pio run -e LV-nordpool-monitor

      - name: Build filesystem (LV-nordpool-monitor)
        run: pio run -e LV-nordpool-monitor -t buildfs

      - name: Build merged flash image
        run: pio run -e LV-nordpool-monitor -t build_merged

      - name: Upload merged-flash.bin
        uses: actions/upload-artifact@v4
        with:
          name: LV-nordpool-monitor
          path: .pio/build/LV-nordpool-monitor/merged-flash.bin
