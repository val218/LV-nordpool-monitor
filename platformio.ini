; PlatformIO Project Configuration — Nordpool Monitor (RA8875 / 7" 800x480)
; Target: generic ESP32 DevKit driving an ER-AS-RA8875 shield + ER-TFTM070-5 panel

[env:LV-nordpool-monitor]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.partitions = min_spiffs.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    adafruit/Adafruit RA8875@^1.4.3
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.14.5
    bblanchon/ArduinoJson@^7.0.4
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.2.14
    robtillaart/PCF8574@^0.4.2
