; PlatformIO Project Configuration — Nordpool Monitor (JC4827W543 / LVGL)
; Target: Guition JC4827W543 — ESP32-S3-WROOM-1 N4R8 (4MB flash, 8MB OPI PSRAM)
;         + 4.3" 480x272 NV3041A display (QSPI), GT911 capacitive touch

[env:LV-nordpool-monitor]
platform = espressif32 @ ~6.10.0      ; pin to a release that ships Arduino-ESP32 core 2.0.17
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

upload_speed = 921600

; ---- Board hardware overrides ----
; The default esp32-s3-devkitc-1 board in PlatformIO is the N8 variant
; (8 MB QD flash, no PSRAM). Our Guition board is N4R8: 4 MB flash + 8 MB
; OPI PSRAM. We have to override flash size and memory_type explicitly,
; otherwise PSRAM will be inactive and the LVGL draw buffers won't fit.
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = min_spiffs.csv
board_build.arduino.memory_type = qio_opi   ; OPI PSRAM, QIO flash
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -DNP_FONTS_AVAILABLE
    -DNP_ICONS_AVAILABLE
    -I"${PROJECT_DIR}"
    -I"${PROJECT_DIR}/include"
    -I"${PROJECT_DIR}/src"
    -std=gnu++17

build_unflags = -std=gnu++11

extra_scripts = post:scripts/merge_firmware.py

; ---- Library pinning ----
; Arduino_GFX 1.6.x requires Arduino-ESP32 core 3.x (it includes
; esp32-hal-periman.h, which only exists in core 3.x). We're on core 2.0.17
; via espressif32 6.10.x, so pin to a 1.4.x release that's known-good with
; the JC4827W543 board (the profi-max community example for this exact
; board uses 1.4.6).
lib_deps =
    moononournation/GFX Library for Arduino @ 1.4.7
    lvgl/lvgl @ 8.4.0
    bblanchon/ArduinoJson @ ^7.0.4
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.2.14

; The GT911 touch driver and the XL9535 driver are small enough that we
; vendor them in src/ rather than depend on libraries — see gt911.cpp and
; xl9535.cpp.
