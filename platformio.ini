; PlatformIO Project Configuration — Nordpool Monitor (JC4827W543 / LVGL)
; Target: Guition JC4827W543 — ESP32-S3-WROOM-1 N4R8 (4MB flash, 8MB PSRAM)
;         + 4.3" 480x272 NV3041A display (QSPI), GT911 capacitive touch

[env:LV-nordpool-monitor]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

upload_speed = 921600

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = min_spiffs.csv
board_build.arduino.memory_type = qio_opi   ; OPI PSRAM, QIO flash
board_upload.flash_size = 4MB
board_upload.maximum_size = 4194304

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -DLV_CONF_INCLUDE_SIMPLE
    -DLV_LVGL_H_INCLUDE_SIMPLE
    -I include
    -I src
    -std=gnu++17

build_unflags = -std=gnu++11

extra_scripts = post:scripts/merge_firmware.py

lib_deps =
    moononournation/GFX Library for Arduino@^1.6.1
    lvgl/lvgl@~8.4.0
    bblanchon/ArduinoJson@^7.0.4
    esp32async/ESPAsyncWebServer@^3.6.0
    esp32async/AsyncTCP@^3.2.14

; The GT911 touch driver and the XL9535 driver are small enough that we
; vendor them in src/ rather than depend on libraries — see touch.cpp and
; xl9535.cpp.
